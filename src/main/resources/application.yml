server:
  port: 7001

spring:
  application:
    name: may-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/postgres?currentSchema=may
    username: ${DB_USER:MAY_APP}
    password: ${DB_PASSWORD:MAY_APP}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false
  mvc:
    problemdetails:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET:5rDmTtqp7KKanOl22OzBh6lC509zs1uuoLoiJkf97gAveb3m1s8SvRn1ugaxvbSm+lwCEn3FG7oRp9JXv58/Dg==}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000
  platform:
    web:
      access-token-expiration: 3600000
      refresh-token-expiration: 604800000
      max-sessions: 1
    mobile:
      access-token-expiration: 3600000
      refresh-token-expiration: 2592000000
      max-sessions: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.may.backend: DEBUG
    org.hibernate.SQL: DEBUG
